<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studioforma Lead Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-name">Studioforma</span>
      <span class="brand-sub">Lead Tracker</span>
    </div>
    <div class="topbar-actions">
      <button id="nav-dashboard" class="btn ghost">Dashboard</button>
      <button id="nav-add" class="btn primary">+ Add Project</button>
    </div>
  </header>

  <main id="app">
    <!-- Views are rendered here by app.js -->
  </main>

  <!-- Data layer first: everything that touches localStorage lives in store.js -->
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
